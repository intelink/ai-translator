# Snippet pentru VirtualHost-ul existent dalvalem.imcu.ro (443 SSL).
# Adaugă în interiorul <VirtualHost *:443> ... </VirtualHost>.
# .htpasswd-ul existent este reutilizat — nu se rescrie.

<Location /translator>
    AuthType Basic
    AuthName "AI Translator"
    AuthUserFile /etc/apache2/.htpasswd_translator
    Require valid-user

    ProxyPass        http://127.0.0.1:8002
    ProxyPassReverse http://127.0.0.1:8002

    # SSE necesită buffering oprit ca să stream-eze în timp real
    SetEnv proxy-sendchunked 1
    SetEnv no-gzip 1
</Location>

# Necesită module: proxy, proxy_http, auth_basic, authn_file, authz_user
#   sudo a2enmod proxy proxy_http auth_basic authn_file authz_user
